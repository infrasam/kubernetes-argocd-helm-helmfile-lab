name: Generate and Scan Manifests

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'releases/**'
      - 'charts/**'
      - 'bases/**'

permissions:
  contents: write
  security-events: write

jobs:
  generate-and-scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout with full history (needed to push commits back)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Helmfile depends on Helm for template rendering
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.3'

      - name: Install Helmfile
        run: |
          HELMFILE_VERSION="0.171.0"
          curl -fsSL -o helmfile.tar.gz \
            "https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
          tar xzf helmfile.tar.gz helmfile
          sudo mv helmfile /usr/local/bin/
          helmfile version

      # Generate manifests - fails the pipeline if any error occurs
      # The script uses set -euo pipefail so any helmfile template failure will exit non-zero
      - name: Generate manifests
        run: |
          chmod +x manifest-generate.sh
          ./manifest-generate.sh

      # Scan generated manifests for CVEs and misconfigurations
      # exit-code 1 means the pipeline fails on CRITICAL or HIGH findings
      - name: Scan manifests with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'generated/'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # Commit rendered manifests back to the branch
      # [skip ci] prevents infinite loop of CI triggering itself
      - name: Commit generated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: auto-generate manifests [skip ci]"
            git push
          fi
