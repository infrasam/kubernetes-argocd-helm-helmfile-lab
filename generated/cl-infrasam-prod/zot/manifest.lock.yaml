apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zot
  namespace: zot
  labels:
    app: zot
    release: zot
  annotations:
    cert-manager.io/cluster-issuer: cloudflare
    ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: "contour"
  tls:
