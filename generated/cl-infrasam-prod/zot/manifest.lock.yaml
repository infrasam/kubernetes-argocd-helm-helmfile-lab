# Source: zot/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot
  labels:
    helm.sh/chart: zot-0.1.104
    app.kubernetes.io/name: zot
    app.kubernetes.io/instance: zot
    app.kubernetes.io/version: "v2.1.15"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
      app.kubernetes.io/instance: zot
  template:
    metadata:
      annotations:
        checksum/config: 0c2a656ee5ac95e04c726262829f7960b8525b60e0d0ce25d82f5190c21d6da1
      labels:
        app.kubernetes.io/name: zot
        app.kubernetes.io/instance: zot
    spec:
      serviceAccountName: zot
      securityContext:
        null
      containers:
        - name: zot
          securityContext:
            null
          image: "ghcr.io/project-zot/zot:v2.1.15"
          imagePullPolicy: IfNotPresent
          env:
            null
          ports:
            - name: zot
              containerPort: 5000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - mountPath: '/etc/zot'
              name: zot-config
            - mountPath: "/secret"
              name: "zot-htpasswd"
            - mountPath: /var/lib/registry
              name: registry-data
          livenessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /livez
              port: 5000
              scheme: HTTP
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /readyz
              port: 5000
              scheme: HTTP
          startupProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            httpGet:
              path: /startupz
              port: 5000
              scheme: HTTP
          resources:
            null
      volumes:
        - name: data
          emptyDir: {}
        - name: zot-config
          configMap:
            name: zot-config
        - name: zot-htpasswd
          secret:
            secretName: zot-htpasswd
        - hostPath:
            path: /var/lib/zot
            type: DirectoryOrCreate
          name: registry-data
      dnsPolicy: ClusterFirst
