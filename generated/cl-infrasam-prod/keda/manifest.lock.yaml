---
# Source: http-app-scaler/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
   name: http-app-service
spec:
   selector:
      app: http-app
   ports:
      - protocol: TCP
        port: 80
        targetPort: 5678
---
# Source: http-app-scaler/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-app
spec:
  replicas: 0
  selector:
    matchLabels:
      app: http-app
  template:
    metadata:
      labels:
        app: http-app
    spec:
      containers:
      - name: http-app
        image: hashicorp/http-echo
        args:
          - "-text=Hello, KEDA!"
        ports:
          - containerPort: 5678
---
# Source: http-app-scaler/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: http-app-keda-ingress
  namespace: keda
  annotations:
    kubernetes.io/ingress.class: contour
    cert-manager.io/cluster-issuer: cloudflare
    ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: contour
  tls:
    - secretName: http-app-tls
      hosts:
        - http-app.k8slabs.se
  rules:
    - host: http-app.k8slabs.se
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keda-add-ons-http-interceptor-proxy
                port:
                  number: 8080
---
# Source: http-app-scaler/templates/scaledobject.yaml
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: http-app-httpso
spec:
  hosts:
    - http-app.k8slabs.se
  pathPrefixes:
    - /
  scaleTargetRef:
    name: http-app
    kind: Deployment
    apiVersion: apps/v1
    service: http-app-service
    port: 80  
  replicas:
    min: 0
    max: 10
  scaledownPeriod: 300
  scalingMetric:
      requestRate:
          granularity: 10s
          targetValue: 5
          window: 1m

